{% extends 'base_dashboard.html' %}

{% block title %}Edit Task{% endblock %}

{% block content %}
<div class="container px-lg-5 px-4 py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <a href="{% url 'task_list' %}" class="text-decoration-none text-muted mb-2 d-inline-block">
                            <i class="fa-solid fa-arrow-left me-2"></i>Back to Tasks
                        </a>
                        <h2 class="fw-bold mb-1">
                            <i class="fa-solid fa-edit text-primary me-2"></i>Edit Task
                        </h2>
                        <p class="text-muted mb-0">Update your task details.</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Title</label>
                            {{ form.title }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Description</label>
                            {{ form.description }}
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Priority</label>
                                {{ form.priority }}
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Status</label>
                                {{ form.status }}
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Deadline</label>
                            {{ form.deadline }}
                        </div>
                        <div class="d-flex gap-2">
                            <a href="{% url 'task_list' %}" class="btn btn-outline-secondary px-4">
                                <i class="fa-solid fa-xmark me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fa-solid fa-save me-2"></i>Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
