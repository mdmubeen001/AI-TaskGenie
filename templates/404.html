{% extends 'base.html' %}

{% block title %}Page Not Found{% endblock %}

{% block content %}

<div class="container py-5 py-lg-6">
    <div class="row justify-content-center">
        <div class="col-lg-6 text-center">
            <div class="mb-4">
                <i class="fa-solid fa-triangle-exclamation fa-5x text-warning"></i>
            </div>
            <h1 class="display-1 fw-bold mb-4">404</h1>
            <h2 class="fw-bold mb-3">Page Not Found</h2>
            <p class="text-muted lead mb-5">
                Oops! The page you're looking for doesn't exist or has been moved.
            </p>
            <div class="d-flex flex-wrap gap-3 justify-content-center">
                <a href="{% url 'home' %}" class="btn btn-primary px-5 py-3 rounded-pill fw-semibold">
                    <i class="fa-solid fa-house me-2"></i>
                    Back to Home
                </a>
                <a href="{% url 'login' %}" class="btn btn-outline-primary px-5 py-3 rounded-pill fw-semibold">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>
                    Sign In
                </a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
